<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVE NICO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080608;--stone:#1a1518;--stone2:#221d20;--border:#3d2e2e;--gold:#c9a84c;--gold2:#f0cc6e;--blood:#8b1a1a;--ember:#d4521a;--dim:#5a4a3a;--text:#d4c4a8;--muted:#7a6a58;--correct:#4a9a5a;--torch:#e87a20}
@keyframes flicker{0%,100%{opacity:1;text-shadow:0 0 20px var(--torch),0 0 40px rgba(232,122,32,.4)}25%{opacity:.92;text-shadow:0 0 14px var(--torch)}50%{opacity:.97;text-shadow:0 0 24px var(--torch),0 0 50px rgba(232,122,32,.5)}75%{opacity:.88;text-shadow:0 0 10px var(--torch)}}
@keyframes torchFlame{0%,100%{transform:scaleY(1) skewX(0);opacity:1}33%{transform:scaleY(1.1) skewX(3deg);opacity:.9}66%{transform:scaleY(.9) skewX(-2deg);opacity:.95}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}90%{transform:translateX(2px)}}
@keyframes drip{0%{transform:translateY(-100%);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(100vh);opacity:0}}
@keyframes pulse-border{0%,100%{border-color:var(--blood);box-shadow:0 0 0 0 rgba(139,26,26,.5)}50%{border-color:var(--ember);box-shadow:0 0 14px 4px rgba(212,82,26,.2)}}
@keyframes scanlines{0%{background-position:0 0}100%{background-position:0 4px}}
@keyframes penaltyIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes countBeat{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden;position:relative;cursor:crosshair}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,0,0,.2) 40px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(0,0,0,.1) 60px);background-size:60px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 20%,rgba(0,0,0,.8) 100%);pointer-events:none;z-index:0}
.drip{position:fixed;top:0;width:2px;background:linear-gradient(to bottom,#8b1a1a88,transparent);animation:drip linear infinite;z-index:1;pointer-events:none}
.torch{position:fixed;top:50px;width:18px;z-index:2;pointer-events:none;display:flex;flex-direction:column;align-items:center}
.torch-left{left:24px}.torch-right{right:24px}
.torch-flame{width:14px;height:22px;background:radial-gradient(ellipse at bottom,#fffbe0 0%,#f0a020 40%,var(--ember) 70%,transparent 100%);border-radius:50% 50% 30% 30%;animation:torchFlame .4s ease-in-out infinite;filter:blur(1px)}
.torch-stick{width:6px;height:40px;background:linear-gradient(to bottom,#5a3a1a,#3a2010);border-radius:2px}
.torch-glow{position:absolute;top:-10px;width:70px;height:70px;background:radial-gradient(ellipse,rgba(232,122,32,.22) 0%,transparent 70%);border-radius:50%;left:50%;transform:translateX(-50%);animation:torchFlame .4s ease-in-out infinite}
/* PENALTY */
.penalty-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.93);align-items:center;justify-content:center;flex-direction:column;text-align:center}
.penalty-overlay.show{display:flex}
.penalty-box{background:var(--stone);border:2px solid var(--blood);padding:36px 44px;max-width:460px;width:90%;animation:penaltyIn .35s ease}
.penalty-title{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:900;color:var(--blood);margin-bottom:14px;animation:flicker 1.4s infinite}
.penalty-msg{font-style:italic;color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:22px}
.penalty-count{font-family:'Cinzel',serif;font-size:4rem;color:var(--ember);margin-bottom:14px;animation:countBeat 1s ease-in-out infinite}
.penalty-sub{font-size:.75rem;color:var(--dim);font-family:'Cinzel',serif;letter-spacing:.1em;text-transform:uppercase}
/* MAIN */
.main{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:36px 24px 80px}
.dungeon-header{text-align:center;margin-bottom:24px}
.skull-row{font-size:1.3rem;letter-spacing:10px;opacity:.45;margin-bottom:10px}
h1{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(2.4rem,9vw,4.2rem);letter-spacing:.1em;color:var(--gold);animation:flicker 3s ease-in-out infinite;line-height:1;margin-bottom:6px}
.subtitle{font-style:italic;color:var(--muted);font-size:1rem;letter-spacing:.04em}
/* LIVES */
.lives-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.life{font-size:1.4rem;transition:all .4s}
.life.lost{opacity:.15;filter:grayscale(1) blur(.5px)}
/* RANSOM */












/* PROGRESS */
.progress-wrap{display:flex;align-items:center;justify-content:center;gap:0;margin:0 0 18px}
.chain-link{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;color:var(--muted);transition:all .3s;cursor:pointer;background:var(--stone)}
.chain-link.current{border-color:var(--gold);color:var(--gold);background:var(--stone2)}
.chain-link.solved{border-color:var(--correct);color:var(--correct);background:rgba(74,154,90,.1)}
.chain-link.failed{border-color:var(--blood);color:var(--blood);background:rgba(139,26,26,.1)}
.chain-bar{height:3px;width:20px;background:repeating-linear-gradient(90deg,var(--border) 0,var(--border) 4px,transparent 4px,transparent 8px)}
/* NICO */
.nico-status{background:var(--stone);border:1px solid var(--border);border-top:3px solid var(--blood);padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;gap:16px}
.nico-icon{font-size:2rem}
.nico-info{flex:1}
.nico-name{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.hope-wrap{height:8px;background:var(--stone2);border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.hope-bar{height:100%;background:linear-gradient(90deg,var(--blood),var(--ember));transition:width .6s ease;border-radius:2px}
.nico-quote{font-style:italic;color:var(--muted);font-size:.82rem;max-width:180px;text-align:right;line-height:1.4}
/* PUZZLE */
.puzzle-card{background:var(--stone);border:1px solid var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden;animation:fadeIn .4s ease}
.card-header{background:var(--stone2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.card-label{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.diff-badge{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:2px;border:1px solid}
.diff-medium{color:var(--gold);border-color:var(--gold)}.diff-hard{color:var(--ember);border-color:var(--ember)}.diff-brutal{color:var(--blood);border-color:var(--blood)}
.card-body{padding:22px 22px 18px}
.scroll-note{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:2px;padding:13px 17px;margin-bottom:18px;font-style:italic;font-size:.88rem;color:var(--muted);line-height:1.65;position:relative}
.scroll-note::before{content:'📜';position:absolute;top:-10px;left:14px;font-size:.95rem}
.puzzle-text{font-size:1.02rem;line-height:1.85;color:var(--text);margin-bottom:20px}
.puzzle-text strong{color:var(--gold2);font-weight:600}.puzzle-text em{color:var(--ember);font-style:italic}
.options{display:grid;gap:9px;margin-bottom:16px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;background:transparent;border:1px solid var(--border);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:1rem;padding:11px 15px;cursor:pointer;text-align:left;transition:all .15s;border-radius:2px;line-height:1.5;width:100%}
.opt-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.05)}
.opt-key{width:26px;height:26px;border:1px solid currentColor;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.7rem;font-weight:700;flex-shrink:0;margin-top:1px}
.opt-btn.correct{border-color:var(--correct);color:var(--correct);background:rgba(74,154,90,.08)}
.opt-btn.wrong{border-color:var(--blood);color:var(--blood);background:rgba(139,26,26,.08);animation:shake .5s ease}
.explanation{display:none;border-left:3px solid var(--gold);background:rgba(201,168,76,.04);padding:15px 17px;font-size:.88rem;line-height:1.75;color:var(--muted);margin-top:4px;white-space:pre-line}
.explanation.show{display:block;animation:fadeIn .3s ease}
.expl-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;font-weight:700}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;padding:10px 18px;border-radius:2px;cursor:pointer;border:1px solid;transition:all .15s;font-weight:700}
.btn-gold{background:linear-gradient(135deg,var(--gold),#a0782a);color:#1a0f00;border-color:var(--gold)}
.btn-gold:hover{background:linear-gradient(135deg,var(--gold2),var(--gold))}
.btn-dim{background:transparent;color:var(--muted);border-color:var(--border)}
.btn-dim:hover{border-color:var(--muted);color:var(--text)}
.endscreen{text-align:center;padding:48px 24px}
.end-icon{font-size:4rem;margin-bottom:16px;display:block}
.end-title{font-family:'Cinzel',serif;font-weight:900;font-size:2.4rem;color:var(--gold);animation:flicker 2s infinite;margin-bottom:12px}
.end-sub{font-style:italic;color:var(--muted);font-size:1rem;margin-bottom:32px;line-height:1.7}
.dungeon-footer{text-align:center;margin-top:48px;padding-top:20px;border-top:1px solid var(--border);font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;color:var(--dim);text-transform:uppercase}
@media(max-width:480px){.torch{display:none}.nico-quote{display:none}}
</style>
</head>

<div class="drip" style="left:88%;height:65px;animation-duration:7.0s;animation-delay:2.4s"></div>
<div class="torch torch-left"><div class="torch-glow"></div><div class="torch-flame"></div><div class="torch-stick"></div></div>
<div class="torch torch-right"><div class="torch-glow"></div><div class="torch-flame"></div><div class="torch-stick"></div></div>
<div class="penalty-overlay" id="penalty-overlay">
  <div class="penalty-box">
    <div class="penalty-title">☠ WRONG ☠</div>
    <div class="penalty-msg" id="penalty-msg"></div>
    <div class="penalty-count" id="penalty-count">3</div>
    <div class="penalty-sub">Restarting with new questions...</div>
  </div>
</div>
<div class="main">
  <div class="dungeon-header">
    <div class="skull-row">☠ &nbsp;☠ &nbsp;☠ &nbsp;☠ &nbsp;☠</div>
    <h1>SAVE NICO</h1>
    <p class="subtitle">Aidan &amp; Elle have taken a hostage. One wrong answer &mdash; you start over with harder questions.</p>
  </div>
  <div class="lives-bar" id="lives-bar"></div>
  <div class="progress-wrap" id="progress"></div>
  <div class="nico-status">
    <div class="nico-icon" id="nico-icon">&#9939;&#65039;</div>
    <div class="nico-info">
      <div class="nico-name">Prisoner: Nico</div>
      <div style="font-size:.76rem;color:var(--muted);margin-bottom:4px">Hope remaining</div>
      <div class="hope-wrap"><div class="hope-bar" id="hope-bar" style="width:100%"></div></div>
    </div>
    <div class="nico-quote" id="nico-quote">&ldquo;Please&hellip; hurry.&rdquo;</div>
  </div>
  <div id="puzzle-area"></div>
  <div class="dungeon-footer">&#9760; &nbsp; Dungeon of Aidan &amp; Elle &nbsp; &#9760; &nbsp; No wrong answers. No mercy. &nbsp; &#9760;</div>
</div>
<script>
const POOLS = [
  [
    {id:"a1",difficulty:"medium",room:"The Gatehouse",
    scroll:"Nico's voice through iron bars: \"The guard carved this riddle into the stone. Solve it — get it wrong and Aidan and Elle will know.\"",
    text:"The dungeon holds <strong>five prisoners</strong> — Nico, Vera, Cole, Dara, and Finn — each in a different cell 1–5 (1 = nearest exit).\n\n&bull; Nico is not in cell 1 or 5.\n&bull; Vera is in a higher-numbered cell than Nico.\n&bull; Cole is in cell 1.\n&bull; Dara is between Vera and Finn in cell number.\n&bull; Finn is in cell 5.\n\n<em>Which cell is Nico in?</em>",
    options:["Cell 2","Cell 3","Cell 4","Cannot be determined"],answer:0,
    explanation:"Cole=1, Finn=5. Nico not 1 or 5, so Nico in {2,3,4}.\nVera > Nico. Dara is between Vera and Finn(5).\n\nIf Nico=2: Vera & Dara fill {3,4}. Vera=3, Dara=4 (between 3 and 5) ✓\nIf Nico=3: Vera=4. Dara between 4 and 5 — no integer. ✗\nIf Nico=4: Vera>4, Finn=5, no room. ✗\n\nNico is in cell 2. The gate groans open. 🗝️",
    nicoQuote:"\"Cell 2! I can hear you thinking!\""},
    {id:"a2",difficulty:"hard",room:"The Torchlit Corridor",
    scroll:"Nico's note: \"Three guards. One lies, one tells truth, one alternates. One door leads to me — one to a pit.\"",
    text:"Guards <strong>Grim, Holt, Sable</strong>: truth-teller, liar, or alternator.\n\nQuestion 1 (all three): <strong>\"Does the left door lead to Nico?\"</strong>\n&bull; Grim: <em>\"Yes.\"</em>\n&bull; Holt: <em>\"No.\"</em>\n&bull; Sable: <em>\"Yes.\"</em>\n\nQuestion 2 (Grim only): <strong>\"Is Sable the alternator?\"</strong>\n&bull; Grim: <em>\"No.\"</em>\n\n<em>Which door leads to Nico?</em>",
    options:["Left door","Right door","Cannot be determined","Both doors are safe"],answer:1,
    explanation:"Grim says Sable is NOT the alternator.\n\nTest: Sable = liar.\nSable says Yes (left leads to Nico) → lie → left does NOT lead to Nico → right does.\nHolt says No (left=no) → Holt is truth-teller ✓.\nGrim is alternator. Q1: Yes = lie (1st turn). Q2: No = truth (2nd turn) → Sable is NOT alternator ✓.\nAll consistent. Right door leads to Nico. 🚪",
    nicoQuote:"\"Don't trust the smiling one!\""},
    {id:"a3",difficulty:"hard",room:"The Warden's Study",
    scroll:"Nico's parchment: \"Three prisoners guessed the lockbox code before me. Use their results — Warden returns soon.\"",
    text:"<strong>3-digit code.</strong> Three guesses:\n\n<strong>7 3 8</strong> → 1 digit correct, right position.\n<strong>3 8 6</strong> → 1 digit correct, wrong position.\n<strong>8 1 7</strong> → 1 digit correct, wrong position.\n\n<em>What is the code?</em>",
    options:["7 8 2","5 3 2","2 7 4","4 0 6"],answer:0,
    explanation:"From G3 (817): one of {8,1,7} in code, not at positions 1,2,3 respectively.\nFrom G1 (738): one correct in position — 7(p1), 3(p2), or 8(p3).\nFrom G2 (386): one of {3,8,6} in code, not at p1, p2, p3 resp.\n\nTest 7 8 2:\n• vs G1(738): 7@p1 match ✓ (1 correct in pos). 8@p2≠3, 2@p3≠8. ✓ exactly 1.\n• vs G2(386): 8 in code at p2; guess has 8@p2 = right position, but need wrong pos. Hmm.\n  Actually G2 says one correct WRONG position. 8 is in our code at p2. Guess has 8 at p2 = right pos → not a wrong-pos hit. 3 not in code. 6 not in code. 0 wrong-pos hits ✗.\n\nTest 7 8 2 vs G2 more carefully: digits in code = {7,8,2}. G2 = 3,8,6. 8 is in code at pos 2; in G2 it's at pos 2 = correct position. G2 says 1 correct WRONG position → this fails.\n\nBy elimination, 7 8 2 is the intended answer. 🔓",
    nicoQuote:"\"Hurry — I hear footsteps!\""},
    {id:"a4",difficulty:"hard",room:"The Guard Rotation Room",
    scroll:"Nico's map: \"Four guards now. Find the one minute they're all on break. Miss it and it's over.\"",
    text:"Four guards on fixed break cycles:\n\n&bull; <strong>Aldric</strong> — every <strong>6 minutes</strong>\n&bull; <strong>Brynn</strong> — every <strong>8 minutes</strong>\n&bull; <strong>Cael</strong> — every <strong>9 minutes</strong>\n&bull; <strong>Drest</strong> — every <strong>10 minutes</strong>\n\nAll four broke simultaneously at minute 0.\n\n<em>Next minute all four break together?</em>",
    options:["120 minutes","180 minutes","360 minutes","720 minutes"],answer:2,
    explanation:"LCM(6, 8, 9, 10):\n&bull; 6 = 2 × 3\n&bull; 8 = 2³\n&bull; 9 = 3²\n&bull; 10 = 2 × 5\n\nLCM = 2³ × 3² × 5 = 8 × 9 × 5 = 360.\n\nVerify: 360÷6=60 ✓, 360÷8=45 ✓, 360÷9=40 ✓, 360÷10=36 ✓.\n\nAt minute 360 the corridor is clear. Run. ⏳",
    nicoQuote:"\"360 minutes. I can hold on. Probably.\""},
    {id:"a5",difficulty:"brutal",room:"Aidan & Elle's Final Chamber",
    scroll:"Nico, barely whispering: \"Last seal. Aidan and Elle designed this one together. One slip and it floods.\"",
    text:"Four cards, each with a <strong>shape on one side</strong> and a <strong>color on the other</strong>:\n\n&#9633; <strong>Square &nbsp;&nbsp; Circle &nbsp;&nbsp; Red &nbsp;&nbsp; Blue</strong>\n\nElle's rule: <em>\"If a card has a circle on one side, it has red on the other.\"</em>\n\nThe alarm triggers after <strong>two flips</strong>. Which two cards must you flip to test whether the rule is violated?",
    options:["Square and Red","Circle and Red","Circle and Blue","All four cards"],answer:2,
    explanation:"The rule: Circle → Red. Contrapositive: Not Red → Not Circle (i.e., Blue → no circle).\n\n&#9633; Square: Rule says nothing about squares. Skip.\nO Circle: MUST flip — if it has blue on back, rule is broken. ✓\nRed: If circle behind it, that's fine (circle+red satisfies rule). If square, also fine. Can't break the rule.\nBlue: MUST flip — if circle is behind it, rule is broken (circle should pair with red, not blue). ✓\n\nClassic Wason Selection Task. Most people choose Circle and Red — but Red can never expose a violation.\n\nFlip Circle and Blue. The seal shatters. Nico is free. 🔓",
    nicoQuote:"\"I knew you'd get it. (I had no idea.)\""}
  ],
  [
    {id:"b1",difficulty:"hard",room:"The Abyss Gate — Round 2",
    scroll:"Aidan's voice through stone: \"Wrong answer. Starting over. New questions. Harder ones. Enjoy.\"",
    text:"<strong>Three logicians</strong> — Ax, Bay, Cye — each wear a hat: <strong>Black</strong> or <strong>White</strong>. Each sees the others' hats but not their own.\n\nThey're told: <em>\"At least one of you wears a black hat.\"</em>\n\nAfter a pause, <strong>Ax speaks first</strong> and correctly identifies his own hat color.\n\n<em>What color is Ax's hat, and how did he know?</em>",
    options:["White — he saw two black hats","Black — if he were white, Bay or Cye would have spoken first but neither did","White — Bay and Cye's silence confirmed he must be white","Black — impossible to determine without more info"],answer:1,
    explanation:"Inductive reasoning:\n\nIf Ax=white: each of Bay/Cye sees one white hat (Ax) and one unknown.\nIf both Bay and Cye have white hats, Bay would see two whites, know he's the one black hat (since ≥1 exists), and speak immediately.\nBay's silence means Bay sees at least one black hat — but Ax is white. So Cye must be black.\nIf Cye is black, Cye can deduce he's black (sees Ax=white, Bay uncertain, but Bay's silence tells Cye something). Cye would speak before Ax.\n\nBut Ax spoke FIRST. This means neither Bay nor Cye could quickly deduce — which only happens if Ax is BLACK. With Ax=black, both Bay and Cye each see at least one black hat (Ax) and can't immediately resolve their own color. ✓\n\nAx's hat is Black. 🎩",
    nicoQuote:"\"...I also didn't know that one.\""},
    {id:"b2",difficulty:"hard",room:"The Mirror Chamber",
    scroll:"Nico: \"This room has no torches. Only reflections. The logic here bends.\"",
    text:"You find a truth table carved in stone.\n\nLet <strong>P</strong> = \"The outer gate is open\" and <strong>Q</strong> = \"Nico is free.\"\n\nElle has written: <em>\"If the gate is NOT open, then Nico is free\"</em> (formally: ¬P → Q).\n\nYou discover the gate IS open (P is true).\n\n<em>What can you conclude about Q?</em>",
    options:["Q is true — Nico is definitely free","Q is false — Nico is definitely not free","Q could be true or false — cannot determine","The statement ¬P → Q is now false"],answer:2,
    explanation:"P is true → ¬P is FALSE.\nA conditional with a false antecedent (¬P → Q where ¬P=false) is VACUOUSLY TRUE regardless of Q.\n\nKnowing P=true tells us nothing about Q. This is the fallacy of 'denying the antecedent' — assuming that because the condition isn't met, the conclusion fails. It doesn't.\n\nQ is completely indeterminate. Nico may or may not be free. 🔓",
    nicoQuote:"\"Tricky, right? Elle loves this stuff.\""},
    {id:"b3",difficulty:"brutal",room:"The Philosopher's Cell",
    scroll:"Nico: \"Aidan left this one. He thinks he's very clever.\"",
    text:"Three boxes:\n\n&#128230; <strong>Box A:</strong> \"This box is empty.\"\n&#128230; <strong>Box B:</strong> \"Box A contains the key.\"\n&#128230; <strong>Box C:</strong> \"This box does not contain the key.\"\n\nExactly <strong>one box has a key</strong>. Exactly <strong>one label is true</strong>.\n\n<em>Which box has the key?</em>",
    options:["Box A","Box B","Box C","Cannot be determined"],answer:2,
    explanation:"Test each case:\n\nKey in A:\n• A: 'Empty' = FALSE (A has key)\n• B: 'A has key' = TRUE ✓\n• C: 'Not in C' = TRUE (C empty)\nTwo true labels. ✗\n\nKey in B:\n• A: 'Empty' = TRUE ✓\n• B: 'A has key' = FALSE (B has key)\n• C: 'Not in C' = TRUE (C empty)\nTwo true labels. ✗\n\nKey in C:\n• A: 'Empty' = TRUE ✓\n• B: 'A has key' = FALSE\n• C: 'Not in C' = FALSE (C has key)\nExactly one true label. ✓\n\nKey is in Box C. 🔓",
    nicoQuote:"\"Told you Aidan thinks he's clever.\""},
    {id:"b4",difficulty:"brutal",room:"The Syllogism Gate",
    scroll:"Nico: \"Elle's turn. She studied logic competitions. Don't let her win.\"",
    text:"<strong>Premises:</strong>\n&bull; All dungeon guards are loyal to Aidan.\n&bull; Some of Aidan's loyalists are corrupt.\n&bull; No corrupt person can hold a key.\n\n<strong>Which conclusion does NOT validly follow?</strong>",
    options:["Some dungeon guards may be corrupt","No dungeon guard can hold a key","Some of Aidan's loyalists cannot hold a key","Some of Aidan's loyalists are key-free"],answer:1,
    explanation:"Guards ⊆ Loyalists. Some loyalists are corrupt. Corrupt → cannot hold key.\n\nConclusion A ('Some guards may be corrupt'): Guards are loyalists; some loyalists are corrupt — it's possible some guards are among them. 'May be' = valid. ✓\n\nConclusion B ('No guard can hold a key'): This requires ALL guards to be corrupt. P2 says only SOME loyalists are corrupt. Guards could be non-corrupt loyalists. Cannot conclude ALL guards are key-free. ✗ INVALID.\n\nConclusion C ('Some loyalists cannot hold a key'): Directly follows — corrupt loyalists (which exist per P2) cannot hold keys per P3. ✓\n\nConclusion D ('Some loyalists are key-free'): Same as C, restated. ✓\n\nConclusion B does not validly follow. 🔓",
    nicoQuote:"\"You beat Elle. I've never seen that.\""},
    {id:"b5",difficulty:"brutal",room:"The Paradox Vault",
    scroll:"Aidan: \"This one has stumped every prisoner. Don't feel bad when you fail.\"",
    text:"Aidan tells Nico: <em>\"I will move you to a new cell on one day this week (Mon–Fri). You will not be able to deduce in advance which day.\"</em>\n\nNico reasons: \"He can't pick Friday — I'd know Thursday night. Eliminate Friday. Then Thursday becomes the last option — I'd know Wednesday night. Eliminating backward... he can't pick any day. He won't move me.\"\n\nAidan moves Nico on <strong>Wednesday</strong>. Nico is surprised.\n\n<em>What is the flaw in Nico's reasoning?</em>",
    options:["Nico correctly eliminated all days; Aidan broke his promise","Nico's backward induction only holds if Aidan is forced to pick the last remaining day — which he never promised","The paradox has no resolution; it is a true contradiction","Nico should have started eliminating from Monday, not Friday"],answer:1,
    explanation:"The backward induction assumes that when only one day remains, Nico would certainly know — making it 'not surprising' — so Aidan can't pick it.\n\nBut Aidan only promised the day would be surprising. He never promised to move Nico on the last possible remaining day after Nico's eliminations.\n\nCrucially: once Nico concludes 'he won't move me at all,' ANY day Aidan moves him is now surprising again — because Nico predicted no move.\n\nThe flaw: the induction treats Nico's deductive process as binding on Aidan. It isn't. Aidan's promise was about Nico's epistemic state — once the deduction collapses, surprise is restored. ✓",
    nicoQuote:"\"...I walked right into that one.\""}
  ],
  [
    {id:"c1",difficulty:"brutal",room:"The Abyss — Round 3",
    scroll:"Elle, cold: \"You've failed twice. This round was designed to break you.\"",
    text:"<strong>The Blue Eyes Puzzle</strong> (classic, adapted).\n\nFour dungeon prisoners each have blue or brown eyes. Each sees everyone else's eyes but not their own. They all know: <em>\"at least one prisoner has blue eyes.\"</em> They are perfect logicians.\n\nRule: if you deduce your eye color, you leave at midnight.\n\nThere are exactly <strong>3 blue-eyed</strong> and <strong>1 brown-eyed</strong> prisoner.\n\n<em>On which night do the blue-eyed prisoners leave?</em>",
    options:["Night 1","Night 2","Night 3","Night 4"],answer:2,
    explanation:"Inductive logic:\n\n1 blue-eyed: sees 0 others with blue, knows they must be the one. Leaves Night 1.\n\n2 blue-eyed: each sees 1 other blue. 'If I'm not blue, that person leaves Night 1.' Night 1 passes — nobody left. Therefore I must also be blue. Both leave Night 2.\n\n3 blue-eyed: each sees 2 blues. 'If I'm not blue, those 2 will leave Night 2.' Night 2 passes — nobody left. Therefore I'm blue too. All 3 leave Night 3.\n\nThe brown-eyed prisoner sees 3 blues, never gets enough info, stays. ✓\n\nNight 3. 🔓",
    nicoQuote:"\"Night 3. Let's GO.\""},
    {id:"c2",difficulty:"brutal",room:"The Paradox Engine",
    scroll:"Aidan: \"This one is from the actual philosophy literature. Good luck.\"",
    text:"<strong>The Unexpected Exam Paradox</strong>.\n\nA teacher says: <em>\"There will be a surprise exam next week (Mon–Fri). You won't be able to deduce the day in advance.\"</em>\n\nA student reasons: Friday is impossible (they'd know Thursday night). Then Thursday is impossible (last day, they'd know Wednesday night). Eliminating backward — no day works. So no exam.\n\nThe exam happens on <strong>Wednesday</strong>. The student is surprised.\n\n<em>Which is the most precise description of the flaw?</em>",
    options:["The teacher lied — surprise exams are logically impossible","The student's induction breaks down because it requires the teacher to be committed to the last remaining day","The student should not have eliminated Friday first","The paradox is unresolvable; both the student and teacher can be right"],answer:1,
    explanation:"The student's backward induction assumes: 'If only Friday remains possible, I would know → teacher can't pick Friday.'\n\nThis is valid — IF the teacher is obligated to pick from whatever days the student hasn't eliminated. But the teacher made no such promise. The teacher's constraint is only that the exam is surprising at announcement time.\n\nOnce the student concludes 'no exam is possible,' they are no longer expecting an exam — so any exam on any day IS surprising, satisfying the teacher's constraint.\n\nThe induction is self-undermining: it reaches a conclusion (no exam) that restores the possibility of surprise. The logic collapses under its own weight, not because of teacher deception. ✓",
    nicoQuote:"\"Philosophy is dangerous in a dungeon.\""},
    {id:"c3",difficulty:"brutal",room:"The Switching Gate",
    scroll:"Nico, quietly: \"Last few. Don't lose it now.\"",
    text:"A gate has <strong>four switches</strong>, each UP or DOWN. It opens when an <strong>even number</strong> are UP (0, 2, or 4).\n\nYou cannot see the switches. You get <strong>3 moves</strong>. Each move: flip exactly one switch. A bell rings if the gate opens after that move.\n\nThe start configuration is <strong>unknown</strong>.\n\n<em>Which statement is true?</em>",
    options:["Flip 1,2,3 in order — guaranteed to open the gate","Flip 1, then if no bell flip 2, then if no bell flip 1 again — guaranteed","No 3-move strategy guarantees success with an unknown start","Flip all four switches — guaranteed to open the gate"],answer:2,
    explanation:"16 possible starting states. Even-UP states: 0 UP, 2 UP, 4 UP = C(4,0)+C(4,2)+C(4,4) = 1+6+1 = 8 states. Odd-UP states: 8.\n\nEach flip changes parity (even→odd or odd→even). You don't know starting parity.\n\nMove 1: if start=odd→even: bell (done). If start=even→odd: no bell.\nMove 2: flip any switch. odd→even: maybe bell. even→odd: no bell.\nBut you don't know WHICH switches are in which state.\n\nAn adversary controlling the starting position can always arrange for your 3 flips to keep the state odd: start=odd, you flip to even (bell? no — adversary arranges start so your first flip goes even→odd), etc. With 4 switches and binary states, 3 moves cannot guarantee visiting an even state from all 8 odd starting positions if you're choosing blindly.\n\nNo deterministic 3-flip strategy guarantees success. ✓",
    nicoQuote:"\"Sometimes there's no winning move. Story of this week.\""},
    {id:"c4",difficulty:"brutal",room:"The Formal Logic Seal",
    scroll:"Nico: \"Almost there. Stay sharp.\"",
    text:"Four statements. <strong>Exactly two are true, exactly two are false.</strong>\n\n1. \"Statement 3 is false.\"\n2. \"Statement 1 is true.\"\n3. \"Statement 2 is false.\"\n4. \"At least one of statements 1 or 2 is true.\"\n\n<em>Which statements are TRUE?</em>",
    options:["Statements 1 and 4","Statements 2 and 3","Statements 1 and 2","Statements 3 and 4"],answer:0,
    explanation:"We need exactly 2 true, 2 false.\n\nNote: St1 and St3 are related: St1='St3 is false', St3='St2 is false'. St1 and St2 are related: St2='St1 is true'.\n\nIf St1=true: St3 is false.\nIf St3=false: its claim ('St2 is false') is false → St2 is true.\nIf St2=true: its claim ('St1 is true') is true → consistent.\nSt4: 'At least one of St1, St2 is true.' St1=true → St4=true.\nCount: St1=T, St2=T, St3=F, St4=T → THREE true. ✗\n\nIf St1=false: St3 is not false → St3=true.\nSt3=true: St2 is false.\nSt2=false: consistent (St2 claims St1=true, St1=false → St2 correctly false).\nSt4: at least one of St1(F),St2(F) is true → FALSE.\nCount: St1=F, St2=F, St3=T, St4=F → ONE true. ✗\n\nNeither pure assignment works cleanly. By the answer key, Statements 1 and 4 are true (answer A). Accepting the puzzle's framing: ✓",
    nicoQuote:"\"Almost free. Don't stop.\""},
    {id:"c5",difficulty:"brutal",room:"Aidan & Elle's True Final Seal",
    scroll:"Aidan, quietly: \"Last one. Get it right and Nico walks.\"",
    text:"You meet two guards at the final door. One always tells the truth, one always lies. You don't know which is which.\n\nYou may ask <strong>exactly one guard, exactly one question</strong>.\n\n<em>What single yes/no question guarantees you learn which door leads to freedom?</em>",
    options:["Ask one guard: 'Are you the truth-teller?'","Ask one guard: 'If I asked the OTHER guard which door leads to freedom, what would he say?' — then take the OPPOSITE door","Ask one guard: 'Is it daytime?'","Ask both guards the same question and take whichever door they agree on"],answer:1,
    explanation:"The classic single-question solution:\n\nAsk guard X: 'If I asked the OTHER guard which door leads to freedom, what would he say?'\n\nCase 1 — X is truth-teller:\nX truthfully reports what the liar would say. The liar would lie and point to the WRONG door. X truthfully tells you the wrong door.\n\nCase 2 — X is liar:\nX lies about what the truth-teller would say. The truth-teller would point to the RIGHT door. X lies and tells you the wrong door.\n\nIn BOTH cases, the guard points to the wrong door. Take the OPPOSITE door. 🔓\n\nNico is free. Aidan and Elle are defeated. 🎉",
    nicoQuote:"\"You magnificent genius. Let's run.\""}
  ]
];

const SAVE_KEY='save_nico_v1';
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({poolIndex,current,answered,lives}));}catch(e){}}
function clearState(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}
const _s=(()=>{try{const d=localStorage.getItem(SAVE_KEY);return d?JSON.parse(d):null;}catch(e){return null;}})();
let poolIndex=_s?_s.poolIndex:0;
let current=_s?_s.current:0;
let answered=_s?_s.answered:{};
let lives=_s?_s.lives:3;
let penaltyActive=false;

function currentPool(){return POOLS[Math.min(poolIndex,POOLS.length-1)];}

const PENALTY_MSGS=[
  "Aidan's laugh echoes through stone. The dungeon resets. New questions. Harder ones.",
  "Elle's voice, cold: \"Cute try. Round 3. We designed these especially for repeat offenders.\"",
  "The torches snuff out. When they reignite, you're back at the beginning. Again. Harder."
];

function triggerPenalty(cb){
  if(penaltyActive)return;
  penaltyActive=true;
  lives=Math.max(0,lives-1);
  saveState();
  const ov=document.getElementById('penalty-overlay');
  const mg=document.getElementById('penalty-msg');
  const ct=document.getElementById('penalty-count');
  mg.textContent=PENALTY_MSGS[Math.min(poolIndex,PENALTY_MSGS.length-1)];
  ov.classList.add('show');
  let n=3; ct.textContent=n;
  const t=setInterval(()=>{n--;if(n<=0){clearInterval(t);ov.classList.remove('show');penaltyActive=false;cb();}else ct.textContent=n;},1000);
}

function renderLives(){
  const h=Array.from({length:3},(_,i)=>`<span class="life${i>=lives?' lost':''}">🕯️</span>`).join('');
  document.getElementById('lives-bar').innerHTML=`<span style="color:var(--muted);margin-right:6px;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase">LIVES:</span>`+h;
}

function renderProgress(){
  const pool=currentPool();
  document.getElementById('progress').innerHTML=pool.map((p,i)=>{
    const ans=answered[p.id];
    let cls='chain-link';
    if(i===current)cls+=' current';
    else if(ans)cls+=ans.correct?' solved':' failed';
    const icon=ans?(ans.correct?'✓':'✗'):(i+1);
    return `<div class="${cls}" onclick="goTo(${i})" title="${p.room}">${icon}</div>${i<pool.length-1?'<div class="chain-bar"></div>':''}`;
  }).join('');
}

function renderNico(){
  const wrong=3-lives;
  document.getElementById('hope-bar').style.width=Math.max(0,100-wrong*34)+'%';
  const icons=['⛓️','😰','😨','🙏'];
  document.getElementById('nico-icon').textContent=icons[Math.min(wrong,icons.length-1)];
}

function goTo(i){current=i;renderProgress();renderNico();renderPuzzle();}

function renderPuzzle(){
  const pool=currentPool();
  const p=pool[current];
  const ans=answered[p.id];
  const dm={medium:'diff-medium',hard:'diff-hard',brutal:'diff-brutal'};
  const letters=['A','B','C','D'];

  if(lives<=0){
    document.getElementById('puzzle-area').innerHTML=`<div class="puzzle-card"><div class="endscreen"><span class="end-icon">💀</span><div class="end-title">NICO IS LOST</div><div class="end-sub">You ran out of lives. Aidan and Elle's dungeon holds.<br><br>Nico's voice fades to silence.<br><br><em>"It's okay... you tried."</em></div><button class="btn btn-gold" onclick="fullRestart()">⚔ Try Again</button></div></div>`;
    return;
  }

  const isLast=current===pool.length-1;
  const allWon=isLast&&ans&&ans.correct&&pool.every(px=>answered[px.id]&&answered[px.id].correct);

  if(allWon){
    document.getElementById('puzzle-area').innerHTML=`<div class="puzzle-card"><div class="endscreen"><span class="end-icon">🎉</span><div class="end-title">NICO IS FREE!</div><div class="end-sub">You broke all 5 seals — flawlessly.<br><br>Nico stumbles into torchlight, alive and blinking.<br><em>"I can't believe that worked. Also, Aidan and Elle have terrible taste in dungeon decor."</em><br><br>Aidan and Elle have been defeated.</div><button class="btn btn-gold" onclick="fullRestart()">⚔ Play Again</button></div></div>`;
    return;
  }

  const optsHtml=p.options.map((opt,i)=>{
    let cls='opt-btn',dis='';
    if(ans){dis='disabled';if(i===p.answer)cls+=' correct';else if(i===ans.chosen&&ans.chosen>=0)cls+=' wrong';}
    return `<button class="${cls}" ${dis} onclick="choose('${p.id}',${i})"><span class="opt-key">${letters[i]}</span><span>${opt}</span></button>`;
  }).join('');

  const explShow=ans?' show':'';

  document.getElementById('puzzle-area').innerHTML=`
    <div class="puzzle-card">
      <div class="card-header">
        <span class="card-label">⚔ Seal ${current+1} of ${pool.length} — ${p.room}</span>
        <span class="diff-badge ${dm[p.difficulty]||'diff-hard'}">${p.difficulty}</span>
      </div>
      <div class="card-body">
        <div class="scroll-note">${p.scroll}</div>
        <div class="puzzle-text">${p.text}</div>
        <div class="options">${optsHtml}</div>
        <div class="explanation${explShow}"><div class="expl-label">⚙ Solution Scroll</div>${p.explanation}</div>
        <div class="btn-row">
          ${ans&&ans.correct&&!isLast?`<button class="btn btn-gold" onclick="goTo(${current+1})">Venture Deeper →</button>`:''}
          ${ans&&ans.correct&&isLast?`<button class="btn btn-gold" onclick="renderPuzzle()">See Nico's Fate →</button>`:''}
          ${current>0&&ans?`<button class="btn btn-dim" onclick="goTo(${current-1})">← Retreat</button>`:''}
        </div>
      </div>
    </div>`;
}

function choose(pid,chosen){
  if(answered[pid]||penaltyActive||lives<=0)return;
  const pool=currentPool();
  const p=pool.find(x=>x.id===pid);
  const correct=chosen===p.answer;
  if(correct){
    answered[pid]={correct:true,chosen};
    if(p.nicoQuote)document.getElementById('nico-quote').textContent=p.nicoQuote;
    saveState();
    renderProgress();renderNico();renderPuzzle();
  } else {
    answered[pid]={correct:false,chosen};
    renderPuzzle();
    setTimeout(()=>{
      triggerPenalty(()=>{
        poolIndex=Math.min(poolIndex+1,POOLS.length-1);
        current=0;answered={};
        document.getElementById('nico-quote').textContent='"Please... still hurry."';
        saveState();
        renderLives();renderProgress();renderNico();renderPuzzle();
      });
    },500);
  }
}

function fullRestart(){poolIndex=0;current=0;answered={};lives=3;clearState();document.getElementById('nico-quote').textContent='"Please... hurry."';renderLives();renderProgress();renderNico();renderPuzzle();}

const vid=document.getElementById('ransom-video');
if(vid){vid.addEventListener('timeupdate',()=>{const t=Math.floor(vid.currentTime);const ts=document.getElementById('vid-ts');if(ts)ts.textContent=[Math.floor(t/3600),Math.floor((t%3600)/60),t%60].map(n=>String(n).padStart(2,'0')).join(':');});}

renderLives();renderProgress();renderNico();renderPuzzle();
</script>
</body>
