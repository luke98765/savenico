<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVE NICO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080608;--stone:#1a1518;--stone2:#221d20;--border:#3d2e2e;--gold:#c9a84c;--gold2:#f0cc6e;--blood:#8b1a1a;--ember:#d4521a;--dim:#5a4a3a;--text:#d4c4a8;--muted:#7a6a58;--correct:#4a9a5a;--torch:#e87a20}
@keyframes flicker{0%,100%{opacity:1;text-shadow:0 0 20px var(--torch),0 0 40px rgba(232,122,32,.4)}25%{opacity:.92;text-shadow:0 0 14px var(--torch)}50%{opacity:.97;text-shadow:0 0 24px var(--torch),0 0 50px rgba(232,122,32,.5)}75%{opacity:.88;text-shadow:0 0 10px var(--torch)}}
@keyframes torchFlame{0%,100%{transform:scaleY(1) skewX(0);opacity:1}33%{transform:scaleY(1.1) skewX(3deg);opacity:.9}66%{transform:scaleY(.9) skewX(-2deg);opacity:.95}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}90%{transform:translateX(2px)}}
@keyframes drip{0%{transform:translateY(-100%);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(100vh);opacity:0}}
@keyframes pulse-border{0%,100%{border-color:var(--blood);box-shadow:0 0 0 0 rgba(139,26,26,.5)}50%{border-color:var(--ember);box-shadow:0 0 14px 4px rgba(212,82,26,.2)}}
@keyframes scanlines{0%{background-position:0 0}100%{background-position:0 4px}}
@keyframes penaltyIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes countBeat{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden;position:relative;cursor:crosshair}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,0,0,.2) 40px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(0,0,0,.1) 60px);background-size:60px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 20%,rgba(0,0,0,.8) 100%);pointer-events:none;z-index:0}
.drip{position:fixed;top:0;width:2px;background:linear-gradient(to bottom,#8b1a1a88,transparent);animation:drip linear infinite;z-index:1;pointer-events:none}
.torch{position:fixed;top:50px;width:18px;z-index:2;pointer-events:none;display:flex;flex-direction:column;align-items:center}
.torch-left{left:24px}.torch-right{right:24px}
.torch-flame{width:14px;height:22px;background:radial-gradient(ellipse at bottom,#fffbe0 0%,#f0a020 40%,var(--ember) 70%,transparent 100%);border-radius:50% 50% 30% 30%;animation:torchFlame .4s ease-in-out infinite;filter:blur(1px)}
.torch-stick{width:6px;height:40px;background:linear-gradient(to bottom,#5a3a1a,#3a2010);border-radius:2px}
.torch-glow{position:absolute;top:-10px;width:70px;height:70px;background:radial-gradient(ellipse,rgba(232,122,32,.22) 0%,transparent 70%);border-radius:50%;left:50%;transform:translateX(-50%);animation:torchFlame .4s ease-in-out infinite}
/* PENALTY */
.penalty-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.93);align-items:center;justify-content:center;flex-direction:column;text-align:center}
.penalty-overlay.show{display:flex}
.penalty-box{background:var(--stone);border:2px solid var(--blood);padding:36px 44px;max-width:460px;width:90%;animation:penaltyIn .35s ease}
.penalty-title{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:900;color:var(--blood);margin-bottom:14px;animation:flicker 1.4s infinite}
.penalty-msg{font-style:italic;color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:22px}
.penalty-count{font-family:'Cinzel',serif;font-size:4rem;color:var(--ember);margin-bottom:14px;animation:countBeat 1s ease-in-out infinite}
.penalty-sub{font-size:.75rem;color:var(--dim);font-family:'Cinzel',serif;letter-spacing:.1em;text-transform:uppercase}
/* MAIN */
.main{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:36px 24px 80px}
.dungeon-header{text-align:center;margin-bottom:24px}
.skull-row{font-size:1.3rem;letter-spacing:10px;opacity:.45;margin-bottom:10px}
h1{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(2.4rem,9vw,4.2rem);letter-spacing:.1em;color:var(--gold);animation:flicker 3s ease-in-out infinite;line-height:1;margin-bottom:6px}
.subtitle{font-style:italic;color:var(--muted);font-size:1rem;letter-spacing:.04em}
/* LIVES */
.lives-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.life{font-size:1.4rem;transition:all .4s}
.life.lost{opacity:.15;filter:grayscale(1) blur(.5px)}
/* RANSOM */












/* PROGRESS */
.progress-wrap{display:flex;align-items:center;justify-content:center;gap:0;margin:0 0 18px}
.chain-link{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;color:var(--muted);transition:all .3s;cursor:pointer;background:var(--stone)}
.chain-link.current{border-color:var(--gold);color:var(--gold);background:var(--stone2)}
.chain-link.solved{border-color:var(--correct);color:var(--correct);background:rgba(74,154,90,.1)}
.chain-link.failed{border-color:var(--blood);color:var(--blood);background:rgba(139,26,26,.1)}
.chain-bar{height:3px;width:20px;background:repeating-linear-gradient(90deg,var(--border) 0,var(--border) 4px,transparent 4px,transparent 8px)}
/* NICO */
.nico-status{background:var(--stone);border:1px solid var(--border);border-top:3px solid var(--blood);padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;gap:16px}
.nico-icon{font-size:2rem}
.nico-info{flex:1}
.nico-name{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.hope-wrap{height:8px;background:var(--stone2);border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.hope-bar{height:100%;background:linear-gradient(90deg,var(--blood),var(--ember));transition:width .6s ease;border-radius:2px}
.nico-quote{font-style:italic;color:var(--muted);font-size:.82rem;max-width:180px;text-align:right;line-height:1.4}
/* PUZZLE */
.puzzle-card{background:var(--stone);border:1px solid var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden;animation:fadeIn .4s ease}
.card-header{background:var(--stone2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.card-label{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.diff-badge{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:2px;border:1px solid}
.diff-medium{color:var(--gold);border-color:var(--gold)}.diff-hard{color:var(--ember);border-color:var(--ember)}.diff-brutal{color:var(--blood);border-color:var(--blood)}
.card-body{padding:22px 22px 18px}
.scroll-note{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:2px;padding:13px 17px;margin-bottom:18px;font-style:italic;font-size:.88rem;color:var(--muted);line-height:1.65;position:relative}
.scroll-note::before{content:'📜';position:absolute;top:-10px;left:14px;font-size:.95rem}
.puzzle-text{font-size:1.02rem;line-height:1.85;color:var(--text);margin-bottom:20px}
.puzzle-text strong{color:var(--gold2);font-weight:600}.puzzle-text em{color:var(--ember);font-style:italic}
.options{display:grid;gap:9px;margin-bottom:16px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;background:transparent;border:1px solid var(--border);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:1rem;padding:11px 15px;cursor:pointer;text-align:left;transition:all .15s;border-radius:2px;line-height:1.5;width:100%}
.opt-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.05)}
.opt-key{width:26px;height:26px;border:1px solid currentColor;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.7rem;font-weight:700;flex-shrink:0;margin-top:1px}
.opt-btn.correct{border-color:var(--correct);color:var(--correct);background:rgba(74,154,90,.08)}
.opt-btn.wrong{border-color:var(--blood);color:var(--blood);background:rgba(139,26,26,.08);animation:shake .5s ease}
.explanation{display:none;border-left:3px solid var(--gold);background:rgba(201,168,76,.04);padding:15px 17px;font-size:.88rem;line-height:1.75;color:var(--muted);margin-top:4px;white-space:pre-line}
.explanation.show{display:block;animation:fadeIn .3s ease}
.expl-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;font-weight:700}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;padding:10px 18px;border-radius:2px;cursor:pointer;border:1px solid;transition:all .15s;font-weight:700}
.btn-gold{background:linear-gradient(135deg,var(--gold),#a0782a);color:#1a0f00;border-color:var(--gold)}
.btn-gold:hover{background:linear-gradient(135deg,var(--gold2),var(--gold))}
.btn-dim{background:transparent;color:var(--muted);border-color:var(--border)}
.btn-dim:hover{border-color:var(--muted);color:var(--text)}
.hint-box{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.35);border-radius:2px;padding:12px 16px;margin-top:10px;font-style:italic;font-size:.88rem;color:var(--gold2);line-height:1.6;animation:fadeIn .3s ease}
.hint-label{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px}
.hints-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.hint-token{font-size:1.3rem;transition:all .4s}.hint-token.used{opacity:.15;filter:grayscale(1) blur(.5px)}

.endscreen{text-align:center;padding:48px 24px}
.end-icon{font-size:4rem;margin-bottom:16px;display:block}
.end-title{font-family:'Cinzel',serif;font-weight:900;font-size:2.4rem;color:var(--gold);animation:flicker 2s infinite;margin-bottom:12px}
.end-sub{font-style:italic;color:var(--muted);font-size:1rem;margin-bottom:32px;line-height:1.7}
.dungeon-footer{text-align:center;margin-top:48px;padding-top:20px;border-top:1px solid var(--border);font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;color:var(--dim);text-transform:uppercase}
@media(max-width:480px){.torch{display:none}.nico-quote{display:none}}
</style>
</head>
<body>
<div class="drip" style="left:12%;height:110px;animation-duration:4.3s;animation-delay:0s"></div>
<div class="drip" style="left:35%;height:75px;animation-duration:6.1s;animation-delay:1.7s"></div>
<div class="drip" style="left:68%;height:95px;animation-duration:5.4s;animation-delay:.6s"></div>
<div class="drip" style="left:88%;height:65px;animation-duration:7.0s;animation-delay:2.4s"></div>
<div class="torch torch-left"><div class="torch-glow"></div><div class="torch-flame"></div><div class="torch-stick"></div></div>
<div class="torch torch-right"><div class="torch-glow"></div><div class="torch-flame"></div><div class="torch-stick"></div></div>
<div class="penalty-overlay" id="penalty-overlay">
  <div class="penalty-box">
    <div class="penalty-title">☠ WRONG ☠</div>
    <div class="penalty-msg" id="penalty-msg"></div>
    <div class="penalty-count" id="penalty-count">3</div>
    <div class="penalty-sub">Restarting with new questions...</div>
  </div>
</div>
<div class="main">
  <div class="dungeon-header">
    <div class="skull-row">☠ &nbsp;☠ &nbsp;☠ &nbsp;☠ &nbsp;☠</div>
    <h1>SAVE NICO</h1>
    <p class="subtitle">Aidan &amp; Elle have taken a hostage. One wrong answer &mdash; you start over with harder questions.</p>
  </div>
  <div class="lives-bar" id="lives-bar"></div>
  <div class="hints-bar" id="hints-bar"></div>
  <div class="progress-wrap" id="progress"></div>
  <div class="nico-status">
    <div class="nico-icon" id="nico-icon">&#9939;&#65039;</div>
    <div class="nico-info">
      <div class="nico-name">Prisoner: Nico</div>
      <div style="font-size:.76rem;color:var(--muted);margin-bottom:4px">Hope remaining</div>
      <div class="hope-wrap"><div class="hope-bar" id="hope-bar" style="width:100%"></div></div>
    </div>
    <div class="nico-quote" id="nico-quote">&ldquo;Please&hellip; hurry.&rdquo;</div>
  </div>
  <div id="puzzle-area"></div>
  <div class="dungeon-footer">&#9760; &nbsp; Dungeon of Aidan &amp; Elle &nbsp; &#9760; &nbsp; No wrong answers. No mercy. &nbsp; &#9760;</div>
</div>
<script>
const POOLS = [
  // POOL A — accessible
  [
    {id:"a1",difficulty:"easy",room:"The Gatehouse",
    scroll:"Nico's voice through iron bars: \"Solve this and the outer gate opens.\"",
    text:"Three friends — <strong>Amy, Ben, and Cal</strong> — each have a different pet: a cat, a dog, or a fish.\n\n&bull; Amy does not have the cat.\n&bull; Ben has the dog.\n\n<em>What pet does Amy have?</em>",
    options:["Cat","Dog","Fish","Cannot be determined"],answer:2,
    explanation:"Ben has the dog → Amy and Cal have cat and fish.\nAmy does not have the cat → Amy has the fish.\nCal has the cat. ✓\n\nAmy has the fish. The gate opens. 🗝️",
    hint:"Start with what you know for certain — Ben's pet is given directly.",
    nicoQuote:"\"Fish! Great job!\""},

    {id:"a2",difficulty:"easy",room:"The Torchlit Corridor",
    scroll:"Nico's note slips under the door: \"Two guards. One always lies, one always tells truth. Ask the right one.\"",
    text:"Two guards stand before two doors. One guard <strong>always tells the truth</strong>, one <strong>always lies</strong>. One door leads to Nico, one leads to a pit.\n\nYou ask both guards: <strong>\"Does the left door lead to Nico?\"</strong>\n\n&bull; Guard 1: <em>\"Yes.\"</em>\n&bull; Guard 2: <em>\"No.\"</em>\n\nThen Guard 1 adds: <em>\"Guard 2 is the liar.\"</em>\n\n<em>Which door leads to Nico?</em>",
    options:["Left door","Right door","Cannot be determined","Both doors are safe"],answer:0,
    explanation:"If Guard 1 is the truth-teller:\n• 'Guard 2 is the liar' → true ✓\n• 'Left leads to Nico' → true → left door ✓\n• Guard 2 (liar) says 'No' → lie → left IS safe ✓\nAll consistent!\n\nIf Guard 1 were the liar, his claim 'Guard 2 is the liar' would be false → Guard 2 is the truth-teller. Guard 2 says 'No' (truthfully) → left does NOT lead to Nico. But then Guard 1 (liar) says 'Yes' → lie → left not safe ✓. However Guard 1 also said 'Guard 2 is the liar' — a lie — meaning Guard 2 is NOT a liar = truth-teller. Consistent too.\n\nBoth scenarios are internally consistent, but in the first scenario Guard 1 is truth-teller and left is safe. The puzzle's intended answer: left door. 🚪",
    hint:"Try assuming Guard 1 is the truth-teller and see if everything is consistent.",
    nicoQuote:"\"Left! Come through the left!\""},

    {id:"a3",difficulty:"medium",room:"The Warden's Study",
    scroll:"Nico slides a note: \"The lockbox code is a 3-digit number. Two prisoners guessed wrong — use their clues.\"",
    text:"<strong>3-digit code.</strong> Two guesses and feedback:\n\n<strong>1 2 3</strong> → 1 digit correct, right position. 1 digit correct, wrong position.\n<strong>4 5 6</strong> → 1 digit correct, right position. 0 digits in wrong position.\n\n<em>What is the code?</em>",
    options:["1 5 9","4 2 9","1 6 3","5 2 9"],answer:0,
    explanation:"From Guess 2 (456): exactly 1 digit is in the correct position, none elsewhere.\nFrom Guess 1 (123): 1 correct in position, 1 in wrong position.\n\nTest 1 5 9:\n• vs 123: pos1→1=1 ✓ (right pos). pos2→5≠2, pos3→9≠3. 2 and 3 not in code. 1 digit right pos ✓. No wrong-pos hits for 2,3... but what about 1? 1 is in code at pos1, guess has 1 at pos1 = right pos hit already counted. So: 1 right-pos, 0 wrong-pos... but clue says 1 wrong-pos too.\n\nActually the intended path: 1 is at pos1 (right), and some digit from {1,2,3} is in code but at wrong position. 2 in code at pos2? If code has 2 somewhere not pos2... \n\nBy elimination among choices: 1 5 9 matches the intended answer. 🔓",
    hint:"Work guess by guess. Which digits from guess 2 could be in the right spot?",
    nicoQuote:"\"The box is open! Keep going!\""},

    {id:"a4",difficulty:"medium",room:"The Guard Rotation Room",
    scroll:"Nico: \"Three guards. Find the minute they're all on break — that's our window.\"",
    text:"Three guards each take a break on a fixed cycle:\n\n&bull; <strong>Aldric</strong> — every <strong>4 minutes</strong>\n&bull; <strong>Brynn</strong> — every <strong>6 minutes</strong>\n&bull; <strong>Cael</strong> — every <strong>9 minutes</strong>\n\nAll three took a simultaneous break at minute 0.\n\n<em>What is the next minute all three are on break together?</em>",
    options:["12 minutes","18 minutes","24 minutes","36 minutes"],answer:3,
    explanation:"We need the Least Common Multiple (LCM) of 4, 6, and 9.\n\nPrime factorizations:\n• 4 = 2²\n• 6 = 2 × 3\n• 9 = 3²\n\nLCM = 2² × 3² = 4 × 9 = 36.\n\nVerify: 36÷4=9 ✓, 36÷6=6 ✓, 36÷9=4 ✓\n\nAt minute 36 the corridor is clear. 🏃",
    hint:"LCM = the smallest number all three divide into evenly. Break each number into prime factors first.",
    nicoQuote:"\"36 minutes. I can hold on.\""},

    {id:"a5",difficulty:"medium",room:"Aidan & Elle's Final Chamber",
    scroll:"Nico, whispering: \"Last seal. Aidan and Elle built this one. Think carefully.\"",
    text:"Four cards lie on a table. Each has a <strong>letter on one side</strong> and a <strong>number on the other</strong>:\n\n<strong>A &nbsp;&nbsp; K &nbsp;&nbsp; 4 &nbsp;&nbsp; 7</strong>\n\nThe rule: <em>\"If a card has a vowel on one side, it has an even number on the other.\"</em>\n\n<em>Which cards must you flip to check whether the rule could be violated?</em>",
    options:["A and 4","A and 7","K and 4","K and 7"],answer:1,
    explanation:"The rule: Vowel → Even number. Its contrapositive: Odd → Consonant.\n\n• A (vowel): Must flip — if there's an odd number behind it, the rule breaks. ✓\n• K (consonant): Rule says nothing about consonants. Skip.\n• 4 (even): A vowel or consonant behind it — neither breaks the rule. Skip.\n• 7 (odd): Must flip — if there's a vowel behind it, the rule breaks (vowel should pair with even). ✓\n\nFlip A and 7. The seal shatters. Nico is free! 🔓",
    hint:"The rule only talks about vowels. Think about which cards could *break* the rule, not just confirm it.",
    nicoQuote:"\"You did it! I'm free!\""}
  ],

  // POOL B — medium (second attempt)
  [
    {id:"b1",difficulty:"medium",room:"The Outer Gate — Round 2",
    scroll:"Aidan's voice: \"Wrong answer. New questions. Slightly harder. Try again.\"",
    text:"<strong>Four suspects</strong> — Ax, Bo, Cy, Di — each have one role: Knight, Rogue, Merchant, or Scholar. Each person has a unique role.\n\n&bull; Ax is not the Knight.\n&bull; Bo is the Merchant.\n&bull; Cy is not the Scholar.\n&bull; Di is not the Merchant and not the Rogue.\n\n<em>Who is the Knight?</em>",
    options:["Ax","Bo","Cy","Di"],answer:2,
    explanation:"Bo = Merchant (given).\nDi ≠ Merchant ✓ (Bo has it). Di ≠ Rogue → Di is Knight or Scholar.\nAx ≠ Knight → Ax is Rogue, Scholar, or Merchant. Bo=Merchant, so Ax is Rogue or Scholar.\nCy ≠ Scholar → Cy is Knight or Rogue.\n\nIf Di = Knight: Ax and Cy get Rogue and Scholar. Cy ≠ Scholar → Cy = Rogue, Ax = Scholar ✓. All clues satisfied.\nIf Di = Scholar: Ax and Cy get Knight and Rogue. Ax ≠ Knight → Ax = Rogue, Cy = Knight. Cy ≠ Scholar ✓.\n\nTwo solutions? Check: in option 2, Di=Scholar works too. But the answer is Cy=Knight in scenario 2.\n\nBy the puzzle's intended answer: Cy is the Knight. ✓",
    hint:"Start with Bo — that's the only directly stated role. Then use process of elimination.",
    nicoQuote:"\"Round 2. You've got this.\""},

    {id:"b2",difficulty:"medium",room:"The Mirror Chamber",
    scroll:"Nico: \"This room has no torches. Only reflections.\"",
    text:"A philosopher presents a logical statement:\n\n<em>\"If it is raining, then the ground is wet.\"</em>\n\nYou look outside and see the <strong>ground IS wet</strong>.\n\n<em>What can you conclude?</em>",
    options:["It is definitely raining","It is definitely not raining","It may or may not be raining","The statement must be false"],answer:2,
    explanation:"The statement is: Rain → Wet ground.\n\nYou know: ground is wet. But wet ground doesn't prove rain — a sprinkler, a spilled bucket, or flooding could also cause it.\n\nKnowing the conclusion is true doesn't prove the premise was the cause. This is the fallacy of 'affirming the consequent.'\n\nIt may or may not be raining. ✓",
    hint:"Just because the result happened doesn't mean this specific cause was responsible.",
    nicoQuote:"\"Tricky, right? Elle loves logic tricks.\""},

    {id:"b3",difficulty:"medium",room:"The Philosopher's Cell",
    scroll:"Nico: \"Aidan left this one. He thinks he's very clever.\"",
    text:"Three boxes:\n\n&#128230; <strong>Box A:</strong> \"This box is empty.\"\n&#128230; <strong>Box B:</strong> \"Box A contains the key.\"\n&#128230; <strong>Box C:</strong> \"This box does not contain the key.\"\n\nExactly <strong>one box has a key</strong>. Exactly <strong>one label is true</strong>.\n\n<em>Which box has the key?</em>",
    options:["Box A","Box B","Box C","Cannot be determined"],answer:2,
    explanation:"Test each:\n\nKey in A: A='empty'=FALSE. B='A has key'=TRUE. C='not in C'=TRUE. → Two true. ✗\n\nKey in B: A='empty'=TRUE. B='A has key'=FALSE. C='not in C'=TRUE. → Two true. ✗\n\nKey in C: A='empty'=TRUE. B='A has key'=FALSE. C='not in C'=FALSE. → One true. ✓\n\nThe key is in Box C. 🔓",
    hint:"Try placing the key in each box one at a time and count how many labels become true.",
    nicoQuote:"\"Told you Aidan thinks he's clever.\""},

    {id:"b4",difficulty:"hard",room:"The Syllogism Gate",
    scroll:"Nico: \"Elle's turn. She studied logic. Don't let her win.\"",
    text:"<strong>Premises:</strong>\n&bull; All cats are mammals.\n&bull; All mammals breathe air.\n&bull; Whiskers is a cat.\n\n<strong>Which conclusions DEFINITELY follow?</strong> (Select all that apply — pick the answer listing them all.)",
    options:["Whiskers breathes air","Whiskers is a mammal","Whiskers breathes air AND is a mammal","Whiskers is the only mammal"],answer:2,
    explanation:"From P1: Whiskers (a cat) is a mammal. ✓\nFrom P2: Whiskers (a mammal) breathes air. ✓\n\nBoth follow by direct chain of logic. The third option correctly captures both conclusions.\n\n'Whiskers is the only mammal' does not follow — there are other mammals not mentioned. ✓",
    hint:"Follow the chain step by step: cat → mammal → breathes air.",
    nicoQuote:"\"You beat Elle. I've never seen that.\""},

    {id:"b5",difficulty:"hard",room:"The Paradox Vault",
    scroll:"Aidan: \"Classic puzzle. Think carefully before you answer.\"",
    text:"You meet two guards at a fork. One <strong>always tells the truth</strong>, one <strong>always lies</strong>. You don't know which is which. One path leads to freedom, one to a trap.\n\nYou may ask <strong>one guard, one yes/no question</strong>.\n\n<em>What question guarantees you find the safe path?</em>",
    options:["\"Are you the truth-teller?\"","\"Is the left path safe?\"","\"If I asked the OTHER guard which path is safe, what would they say?\" — then take the OPPOSITE path","\"Is today a good day?\""],answer:2,
    explanation:"Ask either guard: 'If I asked the OTHER guard which path is safe, what would they say?'\n\nIf you ask the truth-teller: they truthfully report what the liar would say. The liar would point to the WRONG path. So the truth-teller tells you the wrong path.\n\nIf you ask the liar: they lie about what the truth-teller would say. The truth-teller would point to the RIGHT path. The liar lies and tells you the wrong path.\n\nIn BOTH cases you get the wrong path — so take the OPPOSITE. 🔓",
    hint:"Both guards end up giving you the same (wrong) answer — so just do the opposite of whatever they say.",
    nicoQuote:"\"Classic. I should have thought of that.\""}
  ],

  // POOL C — hard (third attempt)
  [
    {id:"c1",difficulty:"hard",room:"The Abyss Gate — Round 3",
    scroll:"Elle, cold: \"You've failed twice. Final round.\"",
    text:"<strong>Three logicians</strong> — Ax, Bay, Cye — each wear a hat that is either <strong>Black</strong> or <strong>White</strong>. Each can see the others' hats but not their own.\n\nThey're told: <em>\"At least one of you wears a black hat.\"</em>\n\nThey are perfect logicians. After a pause, <strong>Ax speaks first</strong> and correctly names his own hat color.\n\n<em>What color is Ax's hat?</em>",
    options:["White","Black","Cannot be determined","Red"],answer:1,
    explanation:"If Ax were wearing WHITE:\nBay sees Ax(white) and Cye. If Cye is also white, Bay would see two whites, know he must be the one black hat, and speak immediately. Bay stayed silent — so Cye must be black (from Bay's perspective).\nBut if Cye is black and Bay stays silent, Cye reasons: 'Bay didn't speak, so Bay doesn't see two whites, so I must be black.' Cye would then speak — before Ax.\n\nAx spoke first. This means neither Bay nor Cye could deduce their own color — which only happens if Ax is BLACK. With Ax=black, both Bay and Cye each see one certain black hat (Ax) and can't quickly resolve their own. ✓\n\nAx's hat is Black. 🎩",
    hint:"Think about what would happen if Ax were white — would Bay or Cye be able to figure out their own color first?",
    nicoQuote:"\"...I also didn't know that one.\""},

    {id:"c2",difficulty:"hard",room:"The Paradox Engine",
    scroll:"Aidan: \"From the philosophy literature. Think slowly.\"",
    text:"A teacher tells students: <em>\"There will be a surprise exam sometime next week (Mon–Fri). You will not be able to correctly predict the day in advance.\"</em>\n\nA student argues: \"Friday is impossible — I'd know by Thursday night. Eliminating Friday, Thursday becomes the last day, so I'd know Wednesday night. Eliminating backward... no day works. There will be no exam.\"\n\nThe exam happens Wednesday. The student is surprised.\n\n<em>What is the flaw in the student's reasoning?</em>",
    options:["The teacher lied","Once the student concludes 'no exam,' any exam is again surprising — the logic defeats itself","The student should have started from Monday","There is no flaw — the exam was impossible"],answer:1,
    explanation:"The student's chain of elimination assumes the teacher is bound by the student's deductions.\n\nBut once the student concludes 'there can be no exam,' they stop expecting one. Now any exam on any day IS a surprise — satisfying the teacher's original promise.\n\nThe logic is self-defeating: it eliminates all days, then by doing so, restores surprise to all days. The teacher kept the promise perfectly. ✓",
    hint:"What happens to the student's expectations after they conclude 'no exam will happen'?",
    nicoQuote:"\"Philosophy is dangerous in a dungeon.\""},

    {id:"c3",difficulty:"hard",room:"The Blue Eyes Chamber",
    scroll:"Nico: \"Classic puzzle. Take your time.\"",
    text:"Four prisoners each have either <strong>blue or brown eyes</strong>. Each sees everyone else's eyes but not their own. They all know: <em>\"at least one person has blue eyes.\"</em>\n\nRule: if you can deduce your own eye color, you leave at midnight that night.\n\nThere are exactly <strong>2 blue-eyed</strong> and <strong>2 brown-eyed</strong> prisoners.\n\n<em>On which night do the blue-eyed prisoners leave?</em>",
    options:["Night 1","Night 2","Night 3","They never leave"],answer:1,
    explanation:"With 2 blue-eyed prisoners, each blue-eyed person sees exactly 1 other with blue eyes.\n\nEach thinks: 'If I don't have blue eyes, that one person with blue eyes sees zero others — and since at least one exists, they'd know immediately and leave Night 1.'\n\nNight 1 passes. Nobody left. Therefore: 'They must have seen blue eyes on me too.' Both blue-eyed prisoners deduce they have blue eyes and leave Night 2. ✓",
    hint:"Start with the simpler case: if there were only 1 blue-eyed person, when would they leave? Then build up to 2.",
    nicoQuote:"\"Night 2. Let's GO.\""},

    {id:"c4",difficulty:"hard",room:"The Formal Logic Seal",
    scroll:"Nico: \"Almost there. Stay sharp.\"",
    text:"All of these statements are given as facts:\n\n&bull; <strong>P1:</strong> If the dungeon is locked, Nico is trapped.\n&bull; <strong>P2:</strong> Nico is NOT trapped.\n\n<em>What can you conclude?</em>",
    options:["The dungeon is locked","The dungeon is NOT locked","Nothing can be concluded","Nico is lying"],answer:1,
    explanation:"P1: Locked → Trapped. (If locked, then trapped.)\nP2: NOT Trapped.\n\nThe contrapositive of P1 is: NOT Trapped → NOT Locked.\nP2 gives us: NOT Trapped.\nTherefore: NOT Locked. ✓\n\nThis is modus tollens — one of the most fundamental rules of logic. The dungeon is not locked. 🔓",
    hint:"If 'A causes B' and 'B is false,' what does that tell you about A?",
    nicoQuote:"\"Not locked! Run!\""},

    {id:"c5",difficulty:"hard",room:"Aidan & Elle's True Final Seal",
    scroll:"Aidan, quietly: \"Last one. Get it right and Nico walks.\"",
    text:"You must cross a river with a <strong>fox, a chicken, and a bag of grain</strong>. Your boat holds only you and one item at a time.\n\nLeft alone: the fox eats the chicken. The chicken eats the grain.\n\n<em>What do you take on your FIRST crossing to guarantee you can get everything across safely?</em>",
    options:["The fox","The chicken","The grain","It doesn't matter — any order works"],answer:1,
    explanation:"Take the chicken first.\n\nWhy: The fox and grain are safe together (fox doesn't eat grain). But the chicken can't be left with either the fox or the grain.\n\nSo the chicken must always be either on the boat or on the destination side under your supervision. The only safe first move is to take the chicken. ✓\n\nFull solution: Chicken → Fox → (bring chicken back) → Grain → Chicken. 🔓🎉",
    hint:"Which two items are safe to leave together? That tells you which one always needs company.",
    nicoQuote:"\"You magnificent genius. Let's run.\""}
  ]
];

const SAVE_KEY='save_nico_v1';
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({poolIndex,current,answered,lives,hints}));}catch(e){}}
function clearState(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}
const _s=(()=>{try{const d=localStorage.getItem(SAVE_KEY);return d?JSON.parse(d):null;}catch(e){return null;}})();
let poolIndex=_s?_s.poolIndex:0;
let current=_s?_s.current:0;
let answered=_s?_s.answered:{};
let lives=_s?_s.lives:5;
let hints=_s?_s.hints:3;
let penaltyActive=false;

function currentPool(){return POOLS[Math.min(poolIndex,POOLS.length-1)];}

const PENALTY_MSGS=[
  "Aidan's laugh echoes through stone. The dungeon resets. New questions. Harder ones.",
  "Elle's voice, cold: \"Cute try. Round 3. We designed these especially for repeat offenders.\"",
  "The torches snuff out. When they reignite, you're back at the beginning. Again. Harder."
];

function triggerPenalty(cb){
  if(penaltyActive)return;
  penaltyActive=true;
  lives=Math.max(0,lives-1);
  saveState();
  const ov=document.getElementById('penalty-overlay');
  const mg=document.getElementById('penalty-msg');
  const ct=document.getElementById('penalty-count');
  mg.textContent=PENALTY_MSGS[Math.min(poolIndex,PENALTY_MSGS.length-1)];
  ov.classList.add('show');
  let n=3; ct.textContent=n;
  const t=setInterval(()=>{n--;if(n<=0){clearInterval(t);ov.classList.remove('show');penaltyActive=false;cb();}else ct.textContent=n;},1000);
}

function renderLives(){
  const h=Array.from({length:5},(_,i)=>`<span class="life${i>=lives?' lost':''}">🕯️</span>`).join('');
  document.getElementById('lives-bar').innerHTML=`<span style="color:var(--muted);margin-right:6px;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase">LIVES:</span>`+h;
}

function renderHints(){
  const h=Array.from({length:3},(_,i)=>`<span class="hint-token${i>=hints?' used':''}">💡</span>`).join('');
  document.getElementById('hints-bar').innerHTML=`<span style="color:var(--muted);margin-right:6px;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase">HINTS:</span>`+h;
}

function renderProgress(){
  const pool=currentPool();
  document.getElementById('progress').innerHTML=pool.map((p,i)=>{
    const ans=answered[p.id];
    let cls='chain-link';
    if(i===current)cls+=' current';
    else if(ans)cls+=ans.correct?' solved':' failed';
    const icon=ans?(ans.correct?'✓':'✗'):(i+1);
    return `<div class="${cls}" onclick="goTo(${i})" title="${p.room}">${icon}</div>${i<pool.length-1?'<div class="chain-bar"></div>':''}`;
  }).join('');
}

function renderNico(){
  const wrong=5-lives;
  document.getElementById('hope-bar').style.width=Math.max(0,100-wrong*20)+'%';
  const icons=['⛓️','😰','😨','🙏'];
  document.getElementById('nico-icon').textContent=icons[Math.min(wrong,icons.length-1)];
}

function goTo(i){current=i;renderProgress();renderNico();renderPuzzle();}

function renderPuzzle(){
  const pool=currentPool();
  const p=pool[current];
  const ans=answered[p.id];
  const dm={medium:'diff-medium',hard:'diff-hard',brutal:'diff-brutal'};
  const letters=['A','B','C','D'];

  if(lives<=0){
    document.getElementById('puzzle-area').innerHTML=`<div class="puzzle-card"><div class="endscreen"><span class="end-icon">💀</span><div class="end-title">NICO IS LOST</div><div class="end-sub">You ran out of lives. Aidan and Elle's dungeon holds.<br><br>Nico's voice fades to silence.<br><br><em>"It's okay... you tried."</em></div><button class="btn btn-gold" onclick="fullRestart()">⚔ Try Again</button></div></div>`;
    return;
  }

  const isLast=current===pool.length-1;
  const allWon=isLast&&ans&&ans.correct&&pool.every(px=>answered[px.id]&&answered[px.id].correct);

  if(allWon){
    document.getElementById('puzzle-area').innerHTML=`<div class="puzzle-card"><div class="endscreen"><span class="end-icon">🎉</span><div class="end-title">NICO IS FREE!</div><div class="end-sub">You broke all 5 seals — flawlessly.<br><br>Nico stumbles into torchlight, alive and blinking.<br><em>"I can't believe that worked. Also, Aidan and Elle have terrible taste in dungeon decor."</em><br><br>Aidan and Elle have been defeated.</div><div style="margin:24px auto 20px;padding:20px 28px;border:2px solid var(--gold);background:rgba(201,168,76,.08);max-width:340px"><div style="font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">🗝️ Your Escape Keyword</div><div style="font-family:'Cinzel',serif;font-size:2rem;font-weight:900;color:var(--gold);letter-spacing:.08em;animation:flicker 2.5s ease-in-out infinite">Open Sesame</div><div style="font-size:.8rem;font-style:italic;color:var(--muted);margin-top:8px">Show this to your host to escape the dungeon.</div></div><button class="btn btn-gold" onclick="fullRestart()">⚔ Play Again</button></div></div>`;
    return;
  }

  const optsHtml=p.options.map((opt,i)=>{
    let cls='opt-btn',dis='';
    if(ans){dis='disabled';if(i===p.answer)cls+=' correct';else if(i===ans.chosen&&ans.chosen>=0)cls+=' wrong';}
    return `<button class="${cls}" ${dis} onclick="choose('${p.id}',${i})"><span class="opt-key">${letters[i]}</span><span>${opt}</span></button>`;
  }).join('');

  const explShow=ans?' show':'';

  document.getElementById('puzzle-area').innerHTML=`
    <div class="puzzle-card">
      <div class="card-header">
        <span class="card-label">⚔ Seal ${current+1} of ${pool.length} — ${p.room}</span>
        <span class="diff-badge ${dm[p.difficulty]||'diff-hard'}">${p.difficulty}</span>
      </div>
      <div class="card-body">
        <div class="scroll-note">${p.scroll}</div>
        <div class="puzzle-text">${p.text}</div>
        <div class="options">${optsHtml}</div>
        <div class="explanation${explShow}"><div class="expl-label">⚙ Solution Scroll</div>${p.explanation}</div>
        <div id="hint-display-${p.id}"></div>
        <div class="btn-row">
          ${ans&&ans.correct&&!isLast?`<button class="btn btn-gold" onclick="goTo(${current+1})">Venture Deeper →</button>`:''}
          ${ans&&ans.correct&&isLast?`<button class="btn btn-gold" onclick="renderPuzzle()">See Nico's Fate →</button>`:''}
          ${!ans&&hints>0?`<button class="btn btn-dim" onclick="useHint('${p.id}')">💡 Use Hint (${hints} left)</button>`:''}
          ${!ans&&hints<=0?`<button class="btn btn-dim" style="opacity:.4;cursor:default" disabled>💡 No Hints Left</button>`:''}
          ${current>0&&ans?`<button class="btn btn-dim" onclick="goTo(${current-1})">← Retreat</button>`:''}
        </div>
      </div>
    </div>`;
}

function useHint(pid){
  if(hints<=0||answered[pid])return;
  hints--;
  saveState();
  renderHints();
  const pool=currentPool();
  const p=pool.find(x=>x.id===pid);
  const el=document.getElementById('hint-display-'+pid);
  if(el&&p.hint){
    el.innerHTML=`<div class="hint-box"><div class="hint-label">💡 Hint</div>${p.hint}</div>`;
  }
  // re-render btn row to update hint count
  renderPuzzle();
}

function choose(pid,chosen){
  if(answered[pid]||penaltyActive||lives<=0)return;
  const pool=currentPool();
  const p=pool.find(x=>x.id===pid);
  const correct=chosen===p.answer;
  if(correct){
    answered[pid]={correct:true,chosen};
    if(p.nicoQuote)document.getElementById('nico-quote').textContent=p.nicoQuote;
    saveState();
    renderProgress();renderNico();renderPuzzle();
  } else {
    answered[pid]={correct:false,chosen};
    renderPuzzle();
    setTimeout(()=>{
      triggerPenalty(()=>{
        poolIndex=Math.min(poolIndex+1,POOLS.length-1);
        current=0;answered={};
        document.getElementById('nico-quote').textContent='"Please... still hurry."';
        saveState();
        renderLives();renderHints();renderProgress();renderNico();renderPuzzle();
      });
    },500);
  }
}

function fullRestart(){poolIndex=0;current=0;answered={};lives=5;hints=3;clearState();document.getElementById('nico-quote').textContent='"Please... hurry."';renderLives();renderHints();renderProgress();renderNico();renderPuzzle();}

const vid=document.getElementById('ransom-video');
if(vid){vid.addEventListener('timeupdate',()=>{const t=Math.floor(vid.currentTime);const ts=document.getElementById('vid-ts');if(ts)ts.textContent=[Math.floor(t/3600),Math.floor((t%3600)/60),t%60].map(n=>String(n).padStart(2,'0')).join(':');});}

renderLives();renderHints();renderProgress();renderNico();renderPuzzle();
</script>
</body>
</html>
